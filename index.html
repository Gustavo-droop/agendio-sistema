<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendio — Sistema de Agendamento Online</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#0d0d0d;color:#f5f0e8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.box{text-align:center;max-width:380px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:6px;color:#d4a843;margin-bottom:4px;}
.logo span{color:#f5f0e8;}
.tag{font-size:11px;color:#555;letter-spacing:3px;margin-bottom:32px;}
p{font-size:15px;color:#888;line-height:1.7;margin-bottom:28px;}
.btn{display:inline-block;background:#c8440a;color:#fff;padding:14px 32px;border-radius:8px;text-decoration:none;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;transition:all .2s;}
.btn:hover{filter:brightness(1.15);transform:translateY(-1px);}
.admin-link{display:block;margin-top:16px;font-size:12px;color:#555;text-decoration:none;}
.admin-link:hover{color:#d4a843;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Agend<span>io</span></div>
  <div class="tag">SISTEMA DE AGENDAMENTO ONLINE</div>
  <p>Bem-vindo(a)! Configure sua Agendio e comece a receber seus primeiros agendamentos.</p>
  <a href="/admin" class="btn">Começar agora</a>
</div>
</body>
</html>
